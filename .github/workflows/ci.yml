name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            install: brew install tmux
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            install: sudo apt-get update && sudo apt-get install -y tmux
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            install: sudo apt-get update && sudo apt-get install -y tmux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check conventional commits
        if: github.event_name == 'pull_request'
        uses: cocogitto/cocogitto-action@v4.2.0
        with:
          command: check
          args: --from-latest-tag
      - uses: jdx/mise-action@v4
      - name: Install tmux
        run: ${{ matrix.install }}
      - name: Verify
        run: mise run check
      - name: Package and verify bundled launcher
        run: mise run package-check
        env:
          TARGET: ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: amux-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  prepare-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4
      - name: Install Cargo version editor
        run: cargo install cargo-edit --locked
      - id: release
        uses: cocogitto/cocogitto-action@v4.2.0
        with:
          command: bump
          args: --auto --skip-ci
          git-user: Cog Bot
          git-user-email: cog@users.noreply.github.com
      - name: Push release commit and tag
        run: git push origin HEAD:main --tags

  package-release:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            install: brew install tmux
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            install: sudo apt-get update && sudo apt-get install -y tmux
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            install: sudo apt-get update && sudo apt-get install -y tmux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.version }}
      - uses: jdx/mise-action@v4
      - name: Install tmux
        run: ${{ matrix.install }}
      - name: Package and verify bundled launcher
        run: mise run package-check
        env:
          TARGET: ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-amux-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-release:
    needs: [prepare-release, package-release]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-amux-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.version }}
          generate_release_notes: true
          files: '*.tar.gz'
